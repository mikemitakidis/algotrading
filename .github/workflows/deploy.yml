name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 138.199.196.95
          username: root
          password: Pattaya1985!
          timeout: 120s
          script: |
            set -e
            BASE=/opt/algo-trader

            echo "=== Deploying latest code ==="

            # Stop the bot
            pkill -f "python3.*main.py" 2>/dev/null || true

            # Force download latest files directly (bypass git entirely)
            RAW="https://raw.githubusercontent.com/mikemitakidis/algotrading/main"
            wget -q -O $BASE/main.py      "$RAW/main.py"
            wget -q -O $BASE/dashboard.py "$RAW/dashboard.py"
            wget -q -O $BASE/backtest.py  "$RAW/backtest.py"
            wget -q -O $BASE/start.sh     "$RAW/start.sh"
            chmod +x $BASE/start.sh

            echo "Files downloaded. Verifying..."
            grep -q "yfinance" $BASE/main.py && echo "OK: main.py has yfinance" || echo "FAIL: main.py missing yfinance"
            grep -q "auth_required" $BASE/dashboard.py && echo "OK: dashboard.py is clean" || echo "WARN"

            # Restart bot only (dashboard restarts itself via pkill+nohup later)
            pkill -f "python3.*dashboard" 2>/dev/null || true
            sleep 2

            source $BASE/venv/bin/activate

            # Restore secret key in settings
            python3 -c "
import yaml
with open('$BASE/config/settings.yaml') as f:
    cfg = yaml.safe_load(f)
# Keep existing secret_key if present
print('secret_key:', repr(cfg.get('alpaca',{}).get('secret_key','')))
"

            nohup python3 $BASE/dashboard.py >> $BASE/logs/dashboard.log 2>&1 &
            sleep 2
            nohup python3 $BASE/main.py >> $BASE/logs/bot.log 2>&1 &

            echo "=== Deploy complete ==="
            echo "Bot PID: $(pgrep -f main.py || echo 'not running')"
            echo "Dashboard PID: $(pgrep -f dashboard.py || echo 'not running')"
            tail -5 $BASE/logs/bot.log
